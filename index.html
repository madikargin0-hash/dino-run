var CH_W = 124, CH_H = 220, WAIST = 136, LEG_W = 124, LEG_H = 84;
var imgTop = new Image(), imgL = new Image(), imgR = new Image();
var heroReady = 0;
[[imgTop, HERO_TOP], [imgL, HERO_LEGL], [imgR, HERO_LEGR]].forEach(function (p) {
  p[0].onload = function () { heroReady++; };
  p[0].src = p[1];
});
var walkPhase = 0;
function heroHeight() { return 80; }
function drawHero(g) {
  if (heroReady < 3) {
    // запасной вариант, пока картинки грузятся
    ctx.font = "56px sans-serif"; ctx.fillText("\uD83C\uDFC3", dinoX(), g - jumpOffset - 6);
    return;
  }
  if (invincible > 0 && Math.floor(invincible * 8) % 2 !== 0) return; // мигание после удара
  var hs = heroHeight() / CH_H;
  var cw = CH_W * hs, ch = CH_H * hs;
  var charX = dinoX();
  var running = started && !gameOver;
  var bob = running ? Math.abs(Math.sin(walkPhase)) * -3 : 0;
  var charTop = g - jumpOffset - ch + bob;
  var legsTop = charTop + WAIST * hs;
  var legImgW = (LEG_W / 2) * hs, legImgH = LEG_H * hs;
  var swing = running ? 0.42 : 0;
  var aL = Math.sin(walkPhase) * swing;
  var aR = Math.sin(walkPhase + Math.PI) * swing;
  // левая нога
  ctx.save();
  ctx.translate(charX + (LEG_W / 4) * hs, legsTop);
  ctx.rotate(aL);
  ctx.drawImage(imgL, -legImgW / 2, 0, legImgW, legImgH);
  ctx.restore();
  // правая нога
  ctx.save();
  ctx.translate(charX + (LEG_W * 3 / 4) * hs, legsTop);
  ctx.rotate(aR);
  ctx.drawImage(imgR, -legImgW / 2, 0, legImgW, legImgH);
  ctx.restore();
  // туловище поверх ног (прячет стык)
  ctx.drawImage(imgTop, charX, charTop, cw, WAIST * hs);
}

function groundY() { return H * 0.75; }
function dinoX() { return 36; }
function dinoSize() { return 56; }

function reset() {
  started = true; gameOver = false;
  jumpOffset = 0; velocity = 0;
  speed = 260; spawnIn = 1.2; balloonIn = 3;
  score = 0; lives = 1; invincible = 0;
  obstacles = []; balloons = []; popups = [];
}

// ======== УПРАВЛЕНИЕ ========
function onTap(x, y) {
  if (!started || gameOver) { reset(); return; }
  // сначала проверяем шарики (щедрая зона нажатия)
  for (var i = balloons.length - 1; i >= 0; i--) {
    var b = balloons[i];
    var dx = x - b.x, dy = y - b.y;
    if (dx * dx + dy * dy < (b.r + 26) * (b.r + 26)) {
      balloons.splice(i, 1);
      if (lives < MAX_LIVES) {
        lives++;
        popups.push({ x: b.x, y: b.y, text: "+1 ❤️", life: 1 });
      } else {
        popups.push({ x: b.x, y: b.y, text: "Жизни полные!", life: 1 });
      }
      return;
    }
  }
  if (jumpOffset <= 0) velocity = 660; // прыжок
}

canvas.addEventListener("pointerdown", function (e) {
  e.preventDefault();
  onTap(e.clientX, e.clientY);
});
window.addEventListener("keydown", function (e) {
  if (e.code === "Space" || e.code === "ArrowUp") {
    if (!started || gameOver) reset();
    else if (jumpOffset <= 0) velocity = 660;
  }
});

// ======== ЛОГИКА ========
function update(dt) {
  speed = Math.min(speed + 9 * dt, 620);
  walkPhase += dt * (6 + speed / 90);
  palmOffset -= speed * 0.4 * dt;
  if (palmOffset < -W) palmOffset += W;
  if (invincible > 0) invincible -= dt;

  // прыжок
  if (jumpOffset > 0 || velocity > 0) {
    velocity -= 1800 * dt;
    jumpOffset += velocity * dt;
    if (jumpOffset <= 0) { jumpOffset = 0; velocity = 0; }
  }

  // новые указатели школ
  spawnIn -= dt;
  if (spawnIn <= 0) {
    var school = Math.floor(Math.random() * SCHOOLS.length);
    ctx.font = "bold 13px sans-serif";
    var nameW = ctx.measureText(SCHOOLS[school][0]).width;
    var o = {
      school: school,
      h: 52 + Math.random() * 30,
      w: Math.max(62, nameW + 16),
      x: W + 100,
      passed: false
    };
    obstacles.push(o);
    spawnIn = 0.9 + Math.random() * 0.9 + 120 / speed;
  }

  // новые шарики
  balloonIn -= dt;
  if (balloonIn <= 0) {
    balloons.push({
      x: W + 40,
      y: 70 + Math.random() * (H * 0.25),
      r: 26,
      kpi: KPIS[Math.floor(Math.random() * KPIS.length)],
      color: BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)],
      bobPhase: Math.random() * 6.28,
      vx: 60 + Math.random() * 40
    });
    balloonIn = 3.5 + Math.random() * 3;
  }

  // движение шариков
  for (var i = balloons.length - 1; i >= 0; i--) {
    var b = balloons[i];
    b.x -= b.vx * dt;
    b.bobPhase += dt * 2;
    if (b.x < -80) balloons.splice(i, 1);
  }

  // подсказки-попапы
  for (var p = popups.length - 1; p >= 0; p--) {
    popups[p].y -= 40 * dt;
    popups[p].life -= dt;
    if (popups[p].life <= 0) popups.splice(p, 1);
  }

  // движение указателей, счёт, столкновения
  var g = groundY();
  var dLeft = dinoX() + 8;
  var dRight = dinoX() + dinoSize() - 12;
  var dBottom = g - jumpOffset - 4;

  for (var j = obstacles.length - 1; j >= 0; j--) {
    var ob = obstacles[j];
    ob.x -= speed * dt;
    if (ob.x + ob.w < 0) { obstacles.splice(j, 1); continue; }
    if (!ob.passed && ob.x + ob.w < dLeft) { ob.passed = true; score++; }
    var oTop = g - ob.h;
    if (invincible <= 0 && dRight > ob.x && dLeft < ob.x + ob.w && dBottom > oTop) {
      lives--;
      invincible = 1.5;
      popups.push({ x: dinoX() + 40, y: g - 80, text: "-1 ❤️", life: 1 });
      if (lives <= 0) {
        gameOver = true;
        if (score > best) {
          best = score;
          try { localStorage.setItem("dinoBest", "" + best); } catch (e) {}
        }
        // счёт для Telegram (работает, когда игра открыта из Telegram)
        if (typeof TelegramGameProxy !== "undefined" && TelegramGameProxy.shareScore) {
          try { TelegramGameProxy.shareScore(); } catch (e) {}
        }
      }
    }
  }
}

// ======== ОТРИСОВКА ========
function draw() {
  var g = groundY();

  // небо
  ctx.fillStyle = "#8ED8F5";
  ctx.fillRect(0, 0, W, H);

  // солнце и облака
  ctx.fillStyle = "#FFD54F";
  ctx.beginPath(); ctx.arc(W - 60, 70, 28, 0, 6.29); ctx.fill();
  ctx.fillStyle = "#FFFFFF";
  roundRect(40, 50, 70, 18, 9); ctx.fill();
  roundRect(W * 0.45, 90, 60, 15, 8); ctx.fill();

  // трава
  ctx.fillStyle = "#7BC24D";
  ctx.fillRect(0, g, W, H - g);
  ctx.strokeStyle = "#5EA03A";
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(W, g); ctx.stroke();

  // пальмы (дальний план)
  ctx.font = "34px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("🌴", palmOffset + W * 0.3, g - 2);
  ctx.fillText("🌴", palmOffset + W * 0.85, g - 2);
  ctx.fillText("🌿", palmOffset + W * 0.6 + 20, g + 24);

  // шарики с KPI
  for (var i = 0; i < balloons.length; i++) {
    var b = balloons[i];
    var by = b.y + Math.sin(b.bobPhase) * 6;
    // ниточка
    ctx.strokeStyle = "#888";
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(b.x, by + b.r); ctx.lineTo(b.x, by + b.r + 18); ctx.stroke();
    // шар
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.ellipse(b.x, by, b.r * 0.85, b.r, 0, 0, 6.29); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.beginPath(); ctx.ellipse(b.x - 8, by - 8, 7, 10, -0.5, 0, 6.29); ctx.fill();
    // табличка с KPI
    ctx.font = "bold 12px sans-serif";
    var tw = ctx.measureText(b.kpi).width;
    ctx.fillStyle = "rgba(255,255,255,0.92)";
    roundRect(b.x - tw / 2 - 8, by + b.r + 18, tw + 16, 20, 8); ctx.fill();
    ctx.fillStyle = "#2E5D1F";
    ctx.textAlign = "center";
    ctx.fillText(b.kpi, b.x, by + b.r + 32);
    ctx.textAlign = "left";
  }

  // указатели школ
  for (var j = 0; j < obstacles.length; j++) {
    var o = obstacles[j];
    var top = g - o.h;
    var cx = o.x + o.w / 2;
    var postH = Math.min(14, o.h * 0.25);
    ctx.fillStyle = "#6B411F";
    ctx.fillRect(cx - 3, g - postH, 6, postH);
    ctx.fillStyle = "#8D5A34";
    roundRect(o.x, top, o.w, o.h - postH, 6); ctx.fill();
    ctx.strokeStyle = "#6B411F";
    ctx.lineWidth = 2.5;
    roundRect(o.x, top, o.w, o.h - postH, 6); ctx.stroke();
    ctx.fillStyle = "#FFF3D9";
    ctx.textAlign = "center";
    ctx.font = "15px sans-serif";
    ctx.fillText("🎓", cx, top + 19);
    ctx.font = "bold 13px sans-serif";
    ctx.fillText(SCHOOLS[o.school][0], cx, top + (o.h - postH) / 2 + 12);
    if (o.h > 68) {
      ctx.font = "8px sans-serif";
      ctx.fillText(SCHOOLS[o.school][1], cx, top + (o.h - postH) / 2 + 24);
    }
    ctx.textAlign = "left";
  }

  // герой бежит
  drawHero(g);

  // всплывающие +1/-1
  ctx.font = "bold 16px sans-serif";
  ctx.textAlign = "center";
  for (var p = 0; p < popups.length; p++) {
    ctx.globalAlpha = Math.max(popups[p].life, 0);
    ctx.fillStyle = "#2E5D1F";
    ctx.fillText(popups[p].text, popups[p].x, popups[p].y);
  }
  ctx.globalAlpha = 1;

  // жизни
  var heartsText = "";
  for (var h = 0; h < lives; h++) heartsText += "❤️";
  ctx.textAlign = "left";
  ctx.font = "18px sans-serif";
  ctx.fillText(heartsText, 12, 30);

  // счёт
  ctx.font = "bold 16px sans-serif";
  var scoreText = "Счёт: " + score + "   Рекорд: " + best;
  var stw = ctx.measureText(scoreText).width;
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  roundRect(W - stw - 28, 10, stw + 20, 26, 9); ctx.fill();
  ctx.fillStyle = "#2E5D1F";
  ctx.fillText(scoreText, W - stw - 18, 28);

  // экраны
  ctx.textAlign = "center";
  ctx.fillStyle = "#2E5D1F";
  if (!started) {
    ctx.font = "bold 26px sans-serif";
    ctx.fillText("🦖 Dino Run", W / 2, H * 0.32);
    ctx.font = "bold 17px sans-serif";
    ctx.fillText("Нажми на экран, чтобы бежать!", W / 2, H * 0.32 + 34);
    ctx.font = "14px sans-serif";
    ctx.fillText("Прыгай через школы, лови шарики с KPI —", W / 2, H * 0.32 + 62);
    ctx.fillText("каждый пойманный шарик даёт +1 жизнь ❤️", W / 2, H * 0.32 + 82);
  } else if (gameOver) {
    ctx.font = "bold 26px sans-serif";
    ctx.fillText("Бум! Врезался в школу 😅", W / 2, H * 0.35);
    ctx.font = "bold 17px sans-serif";
    ctx.fillText("Счёт: " + score + " · Нажми, чтобы сыграть ещё", W / 2, H * 0.35 + 34);
  }
  ctx.textAlign = "left";
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ======== ЦИКЛ ========
function frame(t) {
  if (lastTime) {
    var dt = Math.min((t - lastTime) / 1000, 0.032);
    if (started && !gameOver) update(dt);
  }
  lastTime = t;
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
