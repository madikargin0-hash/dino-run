    border:none;border-radius:10px;padding:12px;font-size:15px;cursor:pointer} #over .btn:disabled{opacity:.7}

  #over .row2 .again{background:#2E5D1F;color:#fff}
</style>

function resize(){DPR=window.devicePixelRatio||1;W=stage.clientWidth;H=stage.clientHeight;
  canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);ctx.imageSmoothingEnabled=false;
  if(assetsReady)buildCity();}
window.addEventListener("resize",resize);

function sr(n){return AST[n];}
function drawSpr(g,name,cx,y,scale,bottom){var r=AST[name];var w=r[2]*scale,h=r[3]*scale;
  g.drawImage(assets,r[0],r[1],r[2],r[3],Math.round(cx-w/2),Math.round(bottom?y-h:y-h/2),Math.round(w),Math.round(h));}

// ---- пре-рендер города из плиток-окон ----
function buildCity(){
  cityCv=document.createElement("canvas");cityCv.width=W;cityCv.height=H;
  var g=cityCv.getContext("2d");g.imageSmoothingEnabled=false;
  var xr=17;
  function rnd(){xr=(xr*1103515245+12345)&0x7fffffff;return xr/0x7fffffff;}
  // дальний слой — простые силуэты
  g.fillStyle="#0A1230";
  var x=0;while(x<W){var bw=30+rnd()*40,bh=H*(0.25+rnd()*0.3);g.fillRect(x,H-bh,bw,bh);x+=bw+3;}
  // ближние здания с окнами
  x=-10;var signPlaced=false;
  while(x<W+10){
    var bw=54+Math.floor(rnd()*46), bh=H*(0.34+rnd()*0.42), by=H-bh;
    g.fillStyle= rnd()<0.5? "#0C1638":"#0A1330"; g.fillRect(x,by,bw,bh);
    g.fillStyle="rgba(255,255,255,0.05)";g.fillRect(x,by,bw,2);
    // окна плитками
    var wn= rnd()<0.5?"win1":"win2"; var ws=Math.min((bw-14)/2, 22)/AST[wn][2];
    var ww=AST[wn][2]*ws, wh=AST[wn][3]*ws, gapx=(bw-14-2*ww)/1, sx=x+7;
    for(var wy=by+10; wy<H-6-wh; wy+=wh+6){
      for(var col=0;col<2;col++){
        var useLit = rnd()<0.16;
        var nm= useLit? "win3":wn;
        var r=AST[nm];
        g.drawImage(assets,r[0],r[1],r[2],r[3], Math.round(sx+col*(ww+gapx)), Math.round(wy), Math.round(ww), Math.round(wh));
      }
    }
    // крыша с антеннами
    if(rnd()<0.5){var rs=bw/AST.roof[2]*1.0;var rw=AST.roof[2]*rs,rh=AST.roof[3]*rs;
      g.drawImage(assets,AST.roof[0],AST.roof[1],AST.roof[2],AST.roof[3],Math.round(x),Math.round(by-rh*0.6),Math.round(rw),Math.round(rh*0.7));}
    // вывеска на одном здании
    if(!signPlaced && x>W*0.3 && bw>70){var ss=(bw-16)/AST.sign[2];var sw=AST.sign[2]*ss,sh=AST.sign[3]*ss;
      g.drawImage(assets,AST.sign[0],AST.sign[1],AST.sign[2],AST.sign[3],Math.round(x+8),Math.round(by+14),Math.round(sw),Math.round(sh));signPlaced=true;}
    x+=bw+4;
  }
}

var state="play",hero,bolts,enemies,shots,pickups,parts,booms,stars,tt,spawnE,spawnP,fireT,lives,score,shake,boss,bossCooldown,muzT;
function reset(){hero={x:W*0.24,y:H*0.55,tx:W*0.24,ty:H*0.55,t:0};
  bolts=[];enemies=[];shots=[];pickups=[];parts=[];booms=[];
  stars=[];for(var i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.6,r:Math.random()<0.85?1:2,tw:Math.random()*6});
  tt=0;spawnE=0.6;spawnP=1.2;fireT=0;lives=4;score=0;shake=0;boss=null;bossCooldown=15;muzT=0;updHud();}
function updHud(){document.getElementById("score").innerHTML="KPI: <b>"+score+"</b>";}

function pointerXY(e){var r=canvas.getBoundingClientRect();
  return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,y:(e.touches?e.touches[0].clientY:e.clientY)-r.top};}
var dragging=false;
canvas.addEventListener("pointerdown",function(e){if(state!=="play")return;dragging=true;move(e);});
canvas.addEventListener("pointermove",function(e){if(dragging)move(e);});
canvas.addEventListener("pointerup",function(){dragging=false;});
canvas.addEventListener("pointercancel",function(){dragging=false;});
function move(e){var p=pointerXY(e);hero.tx=Math.max(W*0.12,Math.min(W*0.55,p.x));hero.ty=Math.max(70,Math.min(H-70,p.y));}

function addBoom(x,y,s){booms.push({x:x,y:y,t:0,s:s||1});}
function update(dt){
  tt+=dt;hero.t+=dt;muzT-=dt;
  hero.x+=(hero.tx-hero.x)*Math.min(1,dt*10);hero.y+=(hero.ty-hero.y)*Math.min(1,dt*10);
  if(shake>0)shake-=dt;
  fireT-=dt;if(fireT<=0){fireT=0.26;bolts.push({x:hero.x+30,y:hero.y+6,vx:600});muzT=0.08;}

  bossCooldown-=dt;
  if(!boss && bossCooldown<=0){boss={x:W+70,y:H*0.24,vx:-60,t:0,hp:22,maxhp:22,shoot:1.3,dir:1};}
  if(boss){boss.t+=dt;
    if(boss.x>W*0.74)boss.x+=boss.vx*dt; else {boss.y+=boss.dir*50*dt;if(boss.y<H*0.14||boss.y>H*0.5)boss.dir*=-1;}
    boss.shoot-=dt;
    if(boss.shoot<=0&&boss.x<W){boss.shoot=0.7;for(var a=-1;a<=1;a++){var ang=Math.atan2(hero.y-boss.y,hero.x-boss.x)+a*0.3;
      shots.push({x:boss.x-24,y:boss.y+6,vx:Math.cos(ang)*175,vy:Math.sin(ang)*175,t:0,kind:Math.random()<0.5?"%":"✂"});}}
    for(var k=bolts.length-1;k>=0;k--){var bb=bolts[k];if(bb.x>boss.x-34&&Math.abs(bb.y-boss.y)<34){bolts.splice(k,1);boss.hp--;addBoom(bb.x,boss.y,0.7);
      if(boss.hp<=0){addBoom(boss.x,boss.y,1.8);score+=15;shake=0.5;boss=null;bossCooldown=20;updHud();break;}}}
  }
  spawnE-=dt;
  if(spawnE<=0&&!boss){spawnE=Math.max(0.75,1.6-tt*0.02);
    enemies.push({x:W+40,y:60+Math.random()*(H*0.62),vx:-(40+Math.random()*45),t:Math.random()*6,shoot:0.8+Math.random(),type:Math.random()<0.5?"red":"grn"});}
  spawnP-=dt;
  if(spawnP<=0){spawnP=1.1+Math.random()*1.2;pickups.push({x:W+20,y:80+Math.random()*(H*0.65),vx:-(90+Math.random()*50),ph:Math.random()*6,type:Math.random()<0.8?"kpi":"coin"});}

  for(var i=bolts.length-1;i>=0;i--){bolts[i].x+=bolts[i].vx*dt;if(bolts[i].x>W+30)bolts.splice(i,1);}

  for(var j=enemies.length-1;j>=0;j--){var en=enemies[j];en.t+=dt;en.x+=en.vx*dt;en.y+=Math.sin(en.t*1.6)*20*dt;
    if(en.x<W*0.58)en.vx=0;en.shoot-=dt;
    if(en.shoot<=0&&en.x<W+10){en.shoot=1.2+Math.random()*1.2;var ang=Math.atan2(hero.y-en.y,hero.x-en.x),sp=150+Math.random()*60;
      shots.push({x:en.x-16,y:en.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,t:0,kind:Math.random()<0.5?"%":"✂"});}
    for(var k2=bolts.length-1;k2>=0;k2--){var b2=bolts[k2];if(Math.abs(b2.x-en.x)<26&&Math.abs(b2.y-en.y)<28){bolts.splice(k2,1);addBoom(en.x,en.y,1);score+=2;updHud();enemies.splice(j,1);shake=0.2;break;}}
    if(en.x<-60)enemies.splice(j,1);}

  for(var s=shots.length-1;s>=0;s--){var sh=shots[s];sh.t+=dt;sh.x+=sh.vx*dt;sh.y+=sh.vy*dt;
    if(sh.x<-30||sh.y<-30||sh.y>H+30){shots.splice(s,1);continue;}
    if(Math.abs(sh.x-hero.x)<20&&Math.abs(sh.y-hero.y)<24){shots.splice(s,1);lives--;updHud();addBoom(hero.x,hero.y,1);shake=0.4;if(lives<=0){gameOver();return;}}}

  for(var p=pickups.length-1;p>=0;p--){var pk=pickups[p];pk.ph+=dt;pk.x+=pk.vx*dt;pk.y+=Math.sin(pk.ph*2)*24*dt;
    if(pk.x<-30){pickups.splice(p,1);continue;}
    if(Math.abs(pk.x-hero.x)<26&&Math.abs(pk.y-hero.y)<26){score+=pk.type==="coin"?3:1;updHud();sparkle(pk.x,pk.y,pk.type==="coin"?"#FFC93C":"#35D07F");pickups.splice(p,1);}}

  for(var q=parts.length-1;q>=0;q--){var pt=parts[q];pt.life-=dt;pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=200*dt;if(pt.life<=0)parts.splice(q,1);}
  for(var bz=booms.length-1;bz>=0;bz--){booms[bz].t+=dt;if(booms[bz].t>0.4)booms.splice(bz,1);}
}
function sparkle(x,y,c){for(var i=0;i<10;i++){var a=Math.random()*6.28,s=30+Math.random()*80;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life:0.5,c:c,r:2});}}

function drawHero(x,y,t){var fl=Math.sin(t*6)*5;ctx.save();ctx.translate(x,y);
  ctx.fillStyle="#0E1430";ctx.beginPath();ctx.moveTo(-14,-16);ctx.quadraticCurveTo(-42-fl,10,-24,44);
  ctx.quadraticCurveTo(-12,28,-4,32);ctx.lineTo(6,32);ctx.quadraticCurveTo(14,28,26,44);ctx.quadraticCurveTo(44+fl,10,16,-16);ctx.closePath();ctx.fill();
  ctx.fillStyle="#1C2540";ctx.fillRect(-11,14,24,26);
  ctx.fillStyle="#FFC93C";star(1,26,7,5);
  ctx.fillStyle="#1C2540";ctx.fillRect(11,20,20,7);
  ctx.fillStyle="rgba(255,59,59,0.9)";ctx.beginPath();ctx.arc(32,23,5,0,6.29);ctx.fill();
  ctx.fillStyle="#141c38";ctx.beginPath();ctx.arc(0,-6,28,Math.PI,0);ctx.lineTo(26,4);
  ctx.quadraticCurveTo(30,-42,0,-44);ctx.quadraticCurveTo(-30,-42,-26,4);ctx.closePath();ctx.fill();
  if(faceReady){var fw=46,fh=fw*face.height/face.width;ctx.drawImage(face,-fw/2,-fh/2-4,fw,fh);}
  ctx.fillStyle="#20305c";ctx.beginPath();ctx.moveTo(-20,-14);ctx.quadraticCurveTo(0,-22,20,-14);ctx.quadraticCurveTo(0,-9,-20,-14);ctx.closePath();ctx.fill();
  ctx.fillStyle="#6FE0FF";ctx.fillRect(-17,-15,7,2);ctx.fillRect(11,-15,7,2);
  ctx.restore();
  if(muzT>0&&assetsReady)drawSpr(ctx,"muzzle",x+40,y+6,0.32,false);
}
function star(cx,cy,r,n){ctx.beginPath();for(var i=0;i<n*2;i++){var a=i*Math.PI/n-Math.PI/2,rr=i%2?r*0.45:r;ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);}ctx.closePath();ctx.fill();}

function draw(){
  ctx.save();if(shake>0)ctx.translate((Math.random()-0.5)*shake*22,(Math.random()-0.5)*shake*22);
  // небо
  var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#070C22");g.addColorStop(0.5,"#0E1740");g.addColorStop(1,"#16224F");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle="#CBD8FF";for(var i=0;i<stars.length;i++){var st=stars[i];ctx.globalAlpha=0.4+0.6*Math.abs(Math.sin(tt*1.5+st.tw));ctx.fillRect(st.x,st.y,st.r,st.r);}ctx.globalAlpha=1;
  ctx.fillStyle="#E9EEFF";ctx.beginPath();ctx.arc(W*0.8,H*0.12,22,0,6.29);ctx.fill();
  ctx.fillStyle="#0E1740";ctx.beginPath();ctx.arc(W*0.85,H*0.105,20,0,6.29);ctx.fill();
  // город
  if(cityCv)ctx.drawImage(cityCv,0,0);

  // пикапы
  for(var p=0;p<pickups.length;p++){var pk=pickups[p];
    if(pk.type==="coin"){ctx.fillStyle="#FFC93C";ctx.beginPath();ctx.arc(pk.x,pk.y,9,0,6.29);ctx.fill();
      ctx.fillStyle="#8A5A00";ctx.font="bold 9px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("$",pk.x,pk.y+0.5);}
    else{ctx.fillStyle="#0E2A1C";ctx.fillRect(pk.x-13,pk.y-11,26,22);ctx.strokeStyle="#35D07F";ctx.lineWidth=2;ctx.strokeRect(pk.x-13,pk.y-11,26,22);
      ctx.fillStyle="#35D07F";ctx.font="bold 8px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("KPI",pk.x,pk.y-3);
      ctx.beginPath();ctx.moveTo(pk.x-7,pk.y+7);ctx.lineTo(pk.x+2,pk.y+1);ctx.lineTo(pk.x+7,pk.y+5);ctx.stroke();}}
  // лазер
  for(var b=0;b<bolts.length;b++){var bo=bolts[b];
    ctx.fillStyle="rgba(255,59,59,0.35)";ctx.fillRect(bo.x-26,bo.y-4,34,8);
    ctx.fillStyle="#FF3B3B";ctx.fillRect(bo.x-20,bo.y-2,26,4);ctx.fillStyle="#FFE0E0";ctx.fillRect(bo.x-4,bo.y-1,10,2);}
  // враги-бойцы
  if(assetsReady)for(var e=0;e<enemies.length;e++){var en=enemies[e];var yb=en.y+22+Math.sin(en.t*2)*3;
    var nm= en.type==="red"? (en.shoot<0.35?"red2":"red1") : (Math.floor(en.t*6)%2?"grn2":"grn1");
    drawSpr(ctx,nm,en.x,yb,0.28,true);}
  // босс — крупный красный боец
  if(boss&&assetsReady){var by=boss.y+40+Math.sin(boss.t*2)*4;drawSpr(ctx,"red2",boss.x,by,0.5,true);
    ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(W/2-90,46,180,10);ctx.fillStyle="#FF3B3B";ctx.fillRect(W/2-88,48,176*(boss.hp/boss.maxhp),6);
    ctx.fillStyle="#EAF0FF";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillText("КОМАНДИР",W/2,64);ctx.textAlign="left";}
  // снаряды
  for(var s=0;s<shots.length;s++){var sh=shots[s];ctx.save();ctx.translate(sh.x,sh.y);ctx.rotate(sh.t*6);
    ctx.font="bold 20px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#FF6B6B";ctx.shadowColor="#FF3B3B";ctx.shadowBlur=8;ctx.fillText(sh.kind,0,0);ctx.restore();ctx.shadowBlur=0;}
  // герой
  if(state==="play")drawHero(hero.x,hero.y,hero.t);
  // взрывы-спрайты
  if(assetsReady)for(var bz=0;bz<booms.length;bz++){var bm=booms[bz];var f=Math.min(3,Math.floor(bm.t/0.4*4));
    drawSpr(ctx,"exp"+(f+1),bm.x,bm.y,0.5*bm.s,false);}
  // искры
  for(var q=0;q<parts.length;q++){var pt=parts[q];ctx.globalAlpha=Math.max(0,pt.life*2);ctx.fillStyle=pt.c;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,6.29);ctx.fill();}
  ctx.globalAlpha=1;
  // сердца-спрайты
  if(assetsReady)for(var hh=0;hh<4;hh++){drawSpr(ctx,hh<lives?"heart":"heart0",22+hh*26,20,0.28,false);}
  ctx.restore();
}

// ---- рейтинг ----
var FB="https://biedugames-default-rtdb.firebaseio.com/board/asan";
var submitted=false,lastName="";
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function renderBoard(list){var ol=document.getElementById("board");ol.innerHTML="";
  if(!list||!list.length){ol.innerHTML='<li class="empty">Пока никого — будь первым!</li>';return;}
  for(var i=0;i<list.length;i++){var e=list[i],li=document.createElement("li");if(submitted&&e.name===lastName)li.className="me";
    li.innerHTML='<span class="rk">'+(i+1)+'.</span><span class="nm">'+esc(e.name)+'</span><b>'+(e.score|0)+'</b>';ol.appendChild(li);}}
function loadBoard(){
  fetch(FB+'.json?orderBy=%22s%22&limitToLast=20').then(function(r){return r.json();}).then(function(o){
    var a=[];if(o)for(var k in o){a.push({name:o[k].n,score:o[k].s});}
    a.sort(function(x,y){return y.score-x.score;});renderBoard(a.slice(0,10));
  }).catch(function(){document.getElementById("board").innerHTML='<li class="empty">Рейтинг недоступен</li>';});
}
document.getElementById("submitBtn").addEventListener("click",function(){if(submitted)return;
  var nm=(document.getElementById("nameInput").value||"").trim().substring(0,20)||"Аноним";lastName=nm;submitted=true;this.disabled=true;this.textContent="Отправлено ✓";
  fetch(FB+'.json',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({n:nm,s:score|0,t:Date.now()})}).then(function(){loadBoard();}).catch(function(){loadBoard();});});
document.getElementById("retry").addEventListener("click",function(){startGame();});
function gameOver(){state="over";document.getElementById("finalSc").textContent=score;document.getElementById("over").style.display="flex";
  submitted=false;var sb=document.getElementById("submitBtn");sb.disabled=false;sb.textContent="В рейтинг";
  document.getElementById("board").innerHTML='<li class="empty">Загрузка…</li>';loadBoard();}
function startGame(){reset();state="play";document.getElementById("over").style.display="none";document.getElementById("hint").style.display="block";
  setTimeout(function(){document.getElementById("hint").style.display="none";},3400);}

var last=0;
function frame(t){var dt=last?Math.min((t-last)/1000,0.033):0;last=t;if(state==="play")update(dt);else tt+=dt;draw();requestAnimationFrame(frame);}
resize();reset();startGame();requestAnimationFrame(frame);
</script>
