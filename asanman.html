<title>Asan-Man 🦸</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  :root{ --ink:#EAF0FF; --dim:#8FA0C8; --kpi:#35D07F; --laser:#FF3B3B; --line:#243257; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#060A1C;color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;overflow:hidden;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;width:min(100vw,460px);height:100%;background:#060A1C;overflow:hidden;}
  canvas{display:block;width:100%;height:100%;touch-action:none;}
  #hud{position:absolute;top:0;left:0;right:0;z-index:4;display:flex;
    justify-content:space-between;align-items:center;padding:12px 14px;pointer-events:none;}
  #lives{font-size:20px;letter-spacing:2px}
  #score{font-weight:800;letter-spacing:.06em;font-size:16px;background:rgba(10,16,48,.7);
    padding:4px 12px;border-radius:20px}
  #score b{color:var(--kpi)}
  #menuBtn{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:6;
    font-size:12px;letter-spacing:.1em;color:#9FB0D8;background:rgba(10,16,48,.7);
    border:1px solid var(--line);border-radius:16px;padding:5px 14px;text-decoration:none;}
  #hint{position:absolute;left:0;right:0;bottom:22px;z-index:4;text-align:center;
    color:#9FB0D8;font-size:13px;pointer-events:none;text-shadow:0 1px 3px #000}
  #over{position:absolute;inset:0;z-index:9;display:none;align-items:center;justify-content:center;
    background:rgba(6,10,28,.85)}
  #over .card{background:#0E1533;border:1px solid var(--line);border-radius:16px;padding:20px 22px;
    width:min(92vw,340px);max-height:90vh;overflow:auto;text-align:center;box-sizing:border-box}
  #over .ttl{font-size:24px;font-weight:900}
  #over .sub{margin:6px 0 14px;color:var(--dim);font-size:16px}
  #over .sub b{color:var(--kpi)}
  #over input{box-sizing:border-box;width:100%;padding:11px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#0A1030;color:var(--ink);margin-bottom:8px}
  #over .btn{box-sizing:border-box;width:100%;background:var(--laser);color:#2a0000;font-weight:800;
    border:none;border-radius:10px;padding:12px;font-size:15px;cursor:pointer}
  #over .btn:disabled{opacity:.7}
  #over .bt{font-weight:700;color:#EAF0FF;margin:14px 0 6px}
  #over ol{text-align:left;margin:0;padding:0;list-style:none}
  #over ol li{display:flex;justify-content:space-between;padding:6px 8px;border-bottom:1px solid #1B2650;font-size:15px}
  #over ol li b{color:#FFC93C}
  #over ol li.me{background:#132048;border-radius:6px}
  #over ol li .rk{color:#6B7BA6;width:26px}
  #over ol li .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #over ol li.empty{justify-content:center;color:#6B7BA6}
  #over .row2{display:flex;gap:8px;margin-top:14px}
  #over .row2 a,#over .row2 button{flex:1;text-decoration:none;text-align:center;
    background:#243257;color:#9FB0D8;font-weight:800;border:none;border-radius:10px;padding:12px;font-size:15px;cursor:pointer}
  #over .row2 .again{background:#2E5D1F;color:#fff}
</style>

<div id="wrap"><div id="stage">
  <a id="menuBtn" href="./">← Меню</a>
  <div id="hud">
    <div id="lives">❤️❤️❤️🤍</div>
    <div id="score">KPI: <b>0</b></div>
  </div>
  <div id="hint">Веди пальцем ↕ · лазер стреляет сам · уворачивайся от % и ✂ · лови зелёные KPI</div>
  <div id="over"><div class="card">
    <div class="ttl">Миссия провалена</div>
    <div class="sub">Собрано KPI: <b><span id="finalSc">0</span></b></div>
    <input id="nameInput" placeholder="Введите имя (по желанию)" maxlength="20" autocomplete="off">
    <button class="btn" id="submitBtn">В рейтинг</button>
    <div class="bt">🏆 Топ по KPI · Asan-Man</div>
    <ol id="board"><li class="empty">Загрузка…</li></ol>
    <div class="row2">
      <button class="again" id="retry">Ещё раз</button>
      <a href="./">← Меню</a>
    </div>
  </div></div>
  <canvas id="game"></canvas>
</div></div>

<script>
var stage=document.getElementById("stage"),canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
var W=0,H=0,DPR=1;
function resize(){DPR=window.devicePixelRatio||1;W=stage.clientWidth;H=stage.clientHeight;
  canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);buildCity();}
window.addEventListener("resize",resize);

var face=new Image(),faceReady=false;
face.onload=function(){faceReady=true};face.src="asan_face.png";

var state="play",hero,bolts,enemies,shots,pickups,parts,stars,city,tt,spawnE,spawnP,fireT,lives,score,shake,boss,killCount,bossCooldown;

function reset(){
  hero={x:W*0.24,y:H*0.55,tx:W*0.24,ty:H*0.55,t:0};
  bolts=[];enemies=[];shots=[];pickups=[];parts=[];
  tt=0;spawnE=0.6;spawnP=1.2;fireT=0;lives=4;score=0;shake=0;
  boss=null;killCount=0;bossCooldown=14;updHud();
}
function updHud(){var s="";for(var i=0;i<4;i++)s+=i<lives?"❤️":"🤍";
  document.getElementById("lives").textContent=s;
  document.getElementById("score").innerHTML="KPI: <b>"+score+"</b>";}

function buildCity(){
  stars=[];for(var i=0;i<70;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.6,r:Math.random()<0.85?1:2,tw:Math.random()*6});
  city=[];var layers=[{c:"#0C1636",h:0.42,w:70,off:0},{c:"#0A1230",h:0.55,w:54,off:0.5},{c:"#070C22",h:0.68,w:40,off:0.2}];
  for(var L=0;L<layers.length;L++){var ly=layers[L],arr=[],x=-ly.w*ly.off;
    while(x<W+ly.w){var bw=ly.w*(0.6+Math.random()*0.8),bh=H*ly.h*(0.5+Math.random()*0.6);
      arr.push({x:x,w:bw,h:bh,c:ly.c,win:Math.random()<0.6});x+=bw+4;}city.push(arr);}
}

function pointerXY(e){var r=canvas.getBoundingClientRect();
  return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,y:(e.touches?e.touches[0].clientY:e.clientY)-r.top};}
var dragging=false;
canvas.addEventListener("pointerdown",function(e){if(state!=="play")return;dragging=true;move(e);});
canvas.addEventListener("pointermove",function(e){if(dragging)move(e);});
canvas.addEventListener("pointerup",function(){dragging=false;});
canvas.addEventListener("pointercancel",function(){dragging=false;});
function move(e){var p=pointerXY(e);hero.tx=Math.max(W*0.12,Math.min(W*0.55,p.x));hero.ty=Math.max(70,Math.min(H-70,p.y));}

function update(dt){
  tt+=dt;hero.t+=dt;
  hero.x+=(hero.tx-hero.x)*Math.min(1,dt*10);hero.y+=(hero.ty-hero.y)*Math.min(1,dt*10);
  if(shake>0)shake-=dt;
  fireT-=dt;if(fireT<=0){fireT=0.26;bolts.push({x:hero.x+30,y:hero.y+6,vx:600});}

  // босс
  bossCooldown-=dt;
  if(!boss && bossCooldown<=0){ boss={x:W+60,y:H*0.24,vx:-60,t:0,hp:22,maxhp:22,shoot:1.4,dir:1}; }
  if(boss){
    boss.t+=dt;
    if(boss.x>W*0.72)boss.x+=boss.vx*dt; else { boss.y+=boss.dir*50*dt; if(boss.y<H*0.12||boss.y>H*0.5)boss.dir*=-1; }
    boss.shoot-=dt;
    if(boss.shoot<=0 && boss.x<W){ boss.shoot=0.7;
      for(var a=-1;a<=1;a++){var ang=Math.atan2(hero.y-boss.y,hero.x-boss.x)+a*0.32;
        shots.push({x:boss.x-20,y:boss.y+10,vx:Math.cos(ang)*175,vy:Math.sin(ang)*175,t:0,kind:Math.random()<0.5?"%":"✂"});}}
    for(var k=bolts.length-1;k>=0;k--){var bb=bolts[k];
      if(bb.x>boss.x-30 && Math.abs(bb.y-boss.y)<30){bolts.splice(k,1);boss.hp--;boom(bb.x,boss.y,6);
        if(boss.hp<=0){boom(boss.x,boss.y,40);score+=15;shake=0.5;boss=null;bossCooldown=20;updHud();break;}}}
  }

  spawnE-=dt;
  if(spawnE<=0 && !boss){spawnE=Math.max(0.7,1.6-tt*0.02);
    enemies.push({x:W+40,y:60+Math.random()*(H*0.6),vx:-(40+Math.random()*45),t:Math.random()*6,hp:1,shoot:0.7+Math.random(),clr:["#B24BE0","#7B1FA2","#00838F","#C62828"][Math.floor(Math.random()*4)]});}
  spawnP-=dt;
  if(spawnP<=0){spawnP=1.1+Math.random()*1.2;
    pickups.push({x:W+20,y:80+Math.random()*(H*0.65),vx:-(90+Math.random()*50),ph:Math.random()*6,type:Math.random()<0.8?"kpi":"coin"});}

  for(var i=bolts.length-1;i>=0;i--){bolts[i].x+=bolts[i].vx*dt;if(bolts[i].x>W+30)bolts.splice(i,1);}

  for(var j=enemies.length-1;j>=0;j--){var en=enemies[j];en.t+=dt;en.x+=en.vx*dt;en.y+=Math.sin(en.t*1.6)*20*dt;
    if(en.x<W*0.58)en.vx=0;en.shoot-=dt;
    if(en.shoot<=0 && en.x<W+10){en.shoot=1.1+Math.random()*1.2;
      var ang=Math.atan2(hero.y-en.y,hero.x-en.x),sp=150+Math.random()*60;
      shots.push({x:en.x-14,y:en.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,t:0,kind:Math.random()<0.5?"%":"✂"});}
    for(var k2=bolts.length-1;k2>=0;k2--){var b2=bolts[k2];
      if(Math.abs(b2.x-en.x)<24&&Math.abs(b2.y-en.y)<22){bolts.splice(k2,1);boom(en.x,en.y,16);score+=2;killCount++;updHud();enemies.splice(j,1);shake=0.2;break;}}
    if(en.x<-50)enemies.splice(j,1);}

  for(var s=shots.length-1;s>=0;s--){var sh=shots[s];sh.t+=dt;sh.x+=sh.vx*dt;sh.y+=sh.vy*dt;
    if(sh.x<-30||sh.y<-30||sh.y>H+30){shots.splice(s,1);continue;}
    if(Math.abs(sh.x-hero.x)<20&&Math.abs(sh.y-hero.y)<24){shots.splice(s,1);lives--;updHud();boom(hero.x,hero.y,16);shake=0.4;
      if(lives<=0){gameOver();return;}}}

  for(var p=pickups.length-1;p>=0;p--){var pk=pickups[p];pk.ph+=dt;pk.x+=pk.vx*dt;pk.y+=Math.sin(pk.ph*2)*24*dt;
    if(pk.x<-30){pickups.splice(p,1);continue;}
    if(Math.abs(pk.x-hero.x)<26&&Math.abs(pk.y-hero.y)<26){score+=pk.type==="coin"?3:1;updHud();sparkle(pk.x,pk.y,pk.type==="coin"?"#FFC93C":"#35D07F");pickups.splice(p,1);}}

  for(var q=parts.length-1;q>=0;q--){var pt=parts[q];pt.life-=dt;pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=200*dt;if(pt.life<=0)parts.splice(q,1);}
}
function boom(x,y,n){for(var i=0;i<n;i++){var a=Math.random()*6.28,s=40+Math.random()*160;
  parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4+Math.random()*0.3,c:Math.random()<0.5?"#FF8A2B":"#FFD54F",r:2+Math.random()*2});}}
function sparkle(x,y,c){for(var i=0;i<10;i++){var a=Math.random()*6.28,s=30+Math.random()*80;
  parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life:0.5,c:c,r:2});}}

function drawCity(){
  var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#0A1030");g.addColorStop(0.55,"#111C46");g.addColorStop(1,"#1B2A5E");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle="#CBD8FF";for(var i=0;i<stars.length;i++){var st=stars[i];ctx.globalAlpha=0.4+0.6*Math.abs(Math.sin(tt*1.5+st.tw));ctx.fillRect(st.x,st.y,st.r,st.r);}ctx.globalAlpha=1;
  ctx.fillStyle="#E9EEFF";ctx.beginPath();ctx.arc(W*0.78,H*0.13,24,0,6.29);ctx.fill();
  ctx.fillStyle="#111C46";ctx.beginPath();ctx.arc(W*0.83,H*0.115,22,0,6.29);ctx.fill();
  for(var L=0;L<city.length;L++){var arr=city[L];for(var b=0;b<arr.length;b++){var bl=arr[b],by=H-bl.h;
    ctx.fillStyle=bl.c;ctx.fillRect(bl.x,by,bl.w,bl.h);
    if(bl.win&&L>=1){ctx.fillStyle="rgba(255,201,60,0.5)";for(var wy=by+8;wy<H-6;wy+=14)for(var wx=bl.x+5;wx<bl.x+bl.w-5;wx+=12)if((wx*7+wy)%3===0)ctx.fillRect(wx,wy,4,6);}}}
}
function drawHero(x,y,t){
  var fl=Math.sin(t*6)*5;ctx.save();ctx.translate(x,y);
  // плащ
  ctx.fillStyle="#0E1430";ctx.beginPath();
  ctx.moveTo(-14,-16);ctx.quadraticCurveTo(-42-fl,10,-24,44);ctx.quadraticCurveTo(-12,28,-4,32);
  ctx.lineTo(6,32);ctx.quadraticCurveTo(14,28,26,44);ctx.quadraticCurveTo(44+fl,10,16,-16);ctx.closePath();ctx.fill();
  // тело
  ctx.fillStyle="#1C2540";ctx.fillRect(-11,14,24,26);
  // знак-звезда
  ctx.fillStyle="#FFC93C";star(1,26,7,5);
  // рука-лазер
  ctx.fillStyle="#1C2540";ctx.fillRect(11,20,20,7);
  ctx.fillStyle="rgba(255,59,59,0.9)";ctx.beginPath();ctx.arc(32,23,5,0,6.29);ctx.fill();
  // капюшон
  ctx.fillStyle="#141c38";ctx.beginPath();ctx.arc(0,-6,28,Math.PI,0);ctx.lineTo(26,4);
  ctx.quadraticCurveTo(30,-42,0,-44);ctx.quadraticCurveTo(-30,-42,-26,4);ctx.closePath();ctx.fill();
  // лицо
  if(faceReady){var fw=46,fh=fw*face.height/face.width;ctx.drawImage(face,-fw/2,-fh/2-4,fw,fh);}
  else{ctx.fillStyle="#D8C6A0";ctx.beginPath();ctx.arc(0,-6,20,0,6.29);ctx.fill();}
  // визор-маска
  ctx.fillStyle="#20305c";ctx.beginPath();ctx.moveTo(-20,-14);ctx.quadraticCurveTo(0,-22,20,-14);ctx.quadraticCurveTo(0,-9,-20,-14);ctx.closePath();ctx.fill();
  ctx.fillStyle="#6FE0FF";ctx.fillRect(-17,-15,7,2);ctx.fillRect(11,-15,7,2);
  ctx.restore();
}
function star(cx,cy,r,n){ctx.beginPath();for(var i=0;i<n*2;i++){var a=i*Math.PI/n-Math.PI/2,rr=i%2?r*0.45:r;ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);}ctx.closePath();ctx.fill();}
function drawVillain(en){ctx.save();ctx.translate(en.x,en.y+Math.sin(en.t*2)*3);
  ctx.fillStyle="#2A1E3E";ctx.fillRect(-12,-8,22,24);
  ctx.fillStyle="#D8C6A0";ctx.fillRect(-8,-20,14,14);
  ctx.fillStyle="#1a0f22";ctx.fillRect(-5,-15,3,3);ctx.fillRect(1,-15,3,3);
  ctx.fillStyle=en.clr;ctx.fillRect(-9,-24,16,5);ctx.restore();}
function drawBoss(bo){ctx.save();ctx.translate(bo.x,bo.y+Math.sin(bo.t*2)*4);
  ctx.fillStyle="#241033";ctx.fillRect(-22,-14,40,42);
  ctx.fillStyle="#D8C6A0";ctx.fillRect(-14,-30,26,22);
  ctx.fillStyle="#1a0f22";ctx.fillRect(-8,-22,5,5);ctx.fillRect(3,-22,5,5);
  ctx.fillStyle="#7a2f18";ctx.fillRect(-8,-11,14,3); // усы
  ctx.fillStyle="#0d0716";ctx.fillRect(-18,-44,32,12);ctx.fillRect(-24,-33,44,4); // цилиндр
  ctx.restore();
  // health bar
  ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(W/2-90,46,180,10);
  ctx.fillStyle="#FF3B3B";ctx.fillRect(W/2-88,48,176*(bo.hp/bo.maxhp),6);
  ctx.fillStyle="#EAF0FF";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillText("МИСТЕР ПРОЦЕНТ",W/2,65);ctx.textAlign="left";}
function drawShot(sh){ctx.save();ctx.translate(sh.x,sh.y);ctx.rotate(sh.t*6);
  ctx.font="bold 20px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle="#FF6B6B";ctx.shadowColor="#FF3B3B";ctx.shadowBlur=8;ctx.fillText(sh.kind,0,0);ctx.restore();ctx.shadowBlur=0;}
function draw(){
  ctx.save();if(shake>0)ctx.translate((Math.random()-0.5)*shake*24,(Math.random()-0.5)*shake*24);
  drawCity();
  for(var p=0;p<pickups.length;p++){var pk=pickups[p];
    if(pk.type==="coin"){ctx.fillStyle="#FFC93C";ctx.beginPath();ctx.arc(pk.x,pk.y,9,0,6.29);ctx.fill();
      ctx.fillStyle="#8A5A00";ctx.font="bold 9px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("$",pk.x,pk.y+0.5);}
    else{ctx.fillStyle="#0E2A1C";ctx.fillRect(pk.x-13,pk.y-11,26,22);ctx.strokeStyle="#35D07F";ctx.lineWidth=2;ctx.strokeRect(pk.x-13,pk.y-11,26,22);
      ctx.fillStyle="#35D07F";ctx.font="bold 8px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("KPI",pk.x,pk.y-3);
      ctx.beginPath();ctx.moveTo(pk.x-7,pk.y+7);ctx.lineTo(pk.x+2,pk.y+1);ctx.lineTo(pk.x+7,pk.y+5);ctx.stroke();}}
  for(var b=0;b<bolts.length;b++){var bo=bolts[b];
    ctx.fillStyle="rgba(255,59,59,0.35)";ctx.fillRect(bo.x-24,bo.y-4,32,8);
    ctx.fillStyle="#FF3B3B";ctx.fillRect(bo.x-18,bo.y-2,24,4);ctx.fillStyle="#FFE0E0";ctx.fillRect(bo.x-4,bo.y-1,10,2);}
  for(var e=0;e<enemies.length;e++)drawVillain(enemies[e]);
  if(boss)drawBoss(boss);
  for(var s=0;s<shots.length;s++)drawShot(shots[s]);
  if(state==="play")drawHero(hero.x,hero.y,hero.t);
  for(var q=0;q<parts.length;q++){var pt=parts[q];ctx.globalAlpha=Math.max(0,pt.life*2);ctx.fillStyle=pt.c;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,6.29);ctx.fill();}
  ctx.globalAlpha=1;ctx.restore();
}

// ---- рейтинг ----
var LB_URL="https://script.google.com/macros/s/AKfycbyQT6pl_K64SxZfYygX_VzunublAia8g4RP_atoKpiWz_lTRUt2tO9Bi5EY4g4LrbjdWg/exec";
var submitted=false,lastName="";
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function renderBoard(list){var ol=document.getElementById("board");ol.innerHTML="";
  if(!list||!list.length){ol.innerHTML='<li class="empty">Пока никого — будь первым!</li>';return;}
  for(var i=0;i<list.length;i++){var e=list[i],li=document.createElement("li");
    if(submitted&&e.name===lastName)li.className="me";
    li.innerHTML='<span class="rk">'+(i+1)+'.</span><span class="nm">'+esc(e.name)+'</span><b>'+(e.score|0)+'</b>';ol.appendChild(li);}}
function loadBoard(){var s=document.createElement("script");
  window.__asanCb=function(d){renderBoard(d);if(s.parentNode)s.parentNode.removeChild(s);};
  s.onerror=function(){document.getElementById("board").innerHTML='<li class="empty">Рейтинг недоступен</li>';};
  s.src=LB_URL+"?action=top&game=asan&callback=__asanCb&t="+Date.now();document.body.appendChild(s);}
document.getElementById("submitBtn").addEventListener("click",function(){
  if(submitted)return;var nm=(document.getElementById("nameInput").value||"").trim().substring(0,20)||"Аноним";
  lastName=nm;submitted=true;this.disabled=true;this.textContent="Отправлено ✓";
  fetch(LB_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"game=asan&name="+encodeURIComponent(nm)+"&score="+score}).then(function(){setTimeout(loadBoard,1000);}).catch(function(){setTimeout(loadBoard,1000);});});
document.getElementById("retry").addEventListener("click",function(){startGame();});

function gameOver(){state="over";document.getElementById("finalSc").textContent=score;
  document.getElementById("over").style.display="flex";document.getElementById("hud").style.display="none";
  submitted=false;var sb=document.getElementById("submitBtn");sb.disabled=false;sb.textContent="В рейтинг";loadBoard();}
function startGame(){reset();state="play";document.getElementById("over").style.display="none";
  document.getElementById("hud").style.display="flex";document.getElementById("hint").style.display="block";
  setTimeout(function(){document.getElementById("hint").style.display="none";},3400);}

var last=0;
function frame(t){var dt=last?Math.min((t-last)/1000,0.033):0;last=t;
  if(state==="play")update(dt);else tt+=dt;draw();requestAnimationFrame(frame);}
