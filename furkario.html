<title>Dino Run 🦖</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #8ED8F5; }
  #game { display: block; touch-action: none; }
  #over { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.45); font-family: system-ui, -apple-system, sans-serif; z-index: 10; }
  #over .card { box-sizing: border-box; background: #FBF6E9; border-radius: 16px; padding: 20px 22px; width: min(92vw, 330px);
    max-height: 88vh; overflow: auto; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
  #over .ttl { font-size: 22px; font-weight: 800; color: #2E5D1F; }
  #over .sub { margin: 6px 0 14px; color: #4A6B2E; font-size: 16px; }
  #over .row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  #over input { box-sizing: border-box; width: 100%; padding: 11px 12px; border: 1px solid #CBBE9A; border-radius: 10px; font-size: 15px; }
  #over button { box-sizing: border-box; width: 100%; background: #FF8A2B; color: #3a1e05; font-weight: 800; border: none; border-radius: 10px; padding: 11px 14px; font-size: 15px; cursor: pointer; }
  #over button:disabled { opacity: .7; }
  #over #againBtn { margin-top: 14px; width: 100%; background: #2E5D1F; color: #fff; padding: 12px; }
  #over .bt { font-weight: 700; color: #2E5D1F; margin-bottom: 6px; }
  #over ol { text-align: left; margin: 0; padding: 0; list-style: none; }
  #over ol li { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px solid #ECE3C9; font-size: 15px; }
  #over ol li b { color: #C25A12; }
  #over ol li.me { background: #FFF0D6; border-radius: 6px; }
  #over ol li .rk { color: #8A7B55; width: 28px; }
  #over ol li .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #over ol li.empty { justify-content: center; color: #8A7B55; }
</style>
<canvas id="game"></canvas>
<div id="over">
  <div class="card">
    <div class="ttl">Игра окончена</div>
    <div class="sub">Твой результат: <b><span id="finalNps">0</span> NPS</b></div>
    <div class="row">
      <input id="nameInput" placeholder="Введите имя (по желанию)" maxlength="20" autocomplete="off">
      <button id="submitBtn">В рейтинг</button>
    </div>
    <div class="bt">🏆 Топ по NPS</div>
    <ol id="board"><li class="empty">Загрузка…</li></ol>
    <button id="againBtn">Играть ещё</button>
  </div>
</div>
<script>
// ======== НАСТРОЙКИ ========
// KPI на шариках — замените на свои
var KPIS = [
  "Выручка +25%",
  "1000 учеников",
  "NPS 92",
  "Retention 95%",
  "5 новых филиалов",
  "Churn < 3%"
];

var SCHOOLS = [
  ["Haileybury", "Астана · Алматы", "#1B3A6B"],
  ["Miras", "Алматы · Астана", "#7B1FA2"],
  ["Tamos", "Алматы", "#C62828"],
  ["KIS", "Алматы", "#EF6C00"],
  ["Galaxy", "Алматы", "#283593"],
  ["AIS", "Алматы", "#00838F"],
  ["Nurorda", "Астана", "#558B2F"],
  ["CIS", "Алматы", "#00695C"],
  ["QCS", "Астана", "#4E342E"],
  ["Ardingly", "Астана", "#AD1457"]
];

var BALLOON_COLORS = ["#E53935", "#8E24AA", "#FB8C00", "#039BE5", "#43A047"];
var MAX_LIVES = 5;

// ======== ХОЛСТ ========
var canvas = document.getElementById("game");
var ctx = canvas.getContext("2d");
var W = 0, H = 0;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ======== СОСТОЯНИЕ ========
var started = false, gameOver = false;
var jumpOffset = 0, velocity = 0;
var speed = 0, spawnIn = 0, balloonIn = 0;
var score = 0, lives = 1;
var best = 0;
try { best = parseInt(localStorage.getItem("dinoBest") || "0", 10); } catch (e) {}
var invincible = 0;      // секунд неуязвимости после удара
var palmOffset = 0;
var obstacles = [];      // {x, w, h, school, passed}
var balloons = [];       // {x, y, r, kpi, color, bobPhase}
var popups = [];         // {x, y, text, life}
var lastTime = 0;

// ---- герой из спрайт-атласа (idle / бег 8 кадров / прыжок / падение) ----
var ATLAS_W=669,ATLAS_H=431;
var FR={
  walk:[[2,2,78,133],[82,2,79,135],[163,2,84,129],[249,2,86,133],[337,2,80,134],[419,2,77,135],[498,2,79,135],[579,2,88,129]],
  idle:[[2,139,72,133],[76,139,72,133],[150,139,72,133],[224,139,73,134]],
  jump:[[2,283,76,129],[80,283,77,136],[159,283,83,146],[244,283,80,142],[326,283,88,139],[416,283,79,139]],
  fall:[299,139,74,142]
};
var heroImg = new Image();
var heroReady = false;
heroImg.onload = function () { heroReady = true; };
heroImg.src = "hero.png";
var walkPhase = 0;
var heroClock = 0;
function heroPx() { return 84; }
function drawFrameRect(rect, cx, feetY) {
  var k = heroPx() / FR.walk[0][3];
  var w = rect[2] * k, h = rect[3] * k;
  ctx.drawImage(heroImg, rect[0], rect[1], rect[2], rect[3], cx - w / 2, feetY - h, w, h);
}
function drawHero(g) {
  var cx = dinoX() + 24;
  var feetY = g - jumpOffset;
  if (!heroReady) {
    ctx.font = "48px sans-serif"; ctx.fillText("\uD83C\uDFC3", dinoX(), feetY - 6);
    return;
  }
  if (invincible > 0 && Math.floor(invincible * 8) % 2 !== 0) return;
  var rect;
  if (!started || gameOver) {
    rect = FR.idle[Math.floor(heroClock * 4) % 4];
  } else if (jumpOffset > 0.5 || velocity !== 0) {
    var jf;
    if (velocity > 250) jf = 1;
    else if (velocity > 60) jf = 2;
    else if (velocity > -60) jf = 3;
    else if (velocity > -260) jf = 4;
    else jf = 5;
    rect = FR.jump[jf];
  } else {
    rect = FR.walk[Math.floor(walkPhase) % 8];
  }
  drawFrameRect(rect, cx, feetY);
}

function groundY() { return H * 0.75; }
function dinoX() { return 36; }
function dinoSize() { return 56; }

function reset() {
  started = true; gameOver = false;
  jumpOffset = 0; velocity = 0;
  speed = 260; spawnIn = 1.2; balloonIn = 3;
  score = 0; lives = 1; invincible = 0;
  obstacles = []; balloons = []; popups = [];
}

// ======== УПРАВЛЕНИЕ ========
function onTap(x, y) {
  if (!started) { reset(); return; }
  if (gameOver) { return; }
  // сначала проверяем шарики (щедрая зона нажатия)
  for (var i = balloons.length - 1; i >= 0; i--) {
    var b = balloons[i];
    var dx = x - b.x, dy = y - b.y;
    if (dx * dx + dy * dy < (b.r + 26) * (b.r + 26)) {
      balloons.splice(i, 1);
      if (lives < MAX_LIVES) {
        lives++;
        popups.push({ x: b.x, y: b.y, text: "+1 ❤️", life: 1 });
      } else {
        popups.push({ x: b.x, y: b.y, text: "Жизни полные!", life: 1 });
      }
      return;
    }
  }
  if (jumpOffset <= 0) velocity = 660; // прыжок
}

canvas.addEventListener("pointerdown", function (e) {
  e.preventDefault();
  onTap(e.clientX, e.clientY);
});
window.addEventListener("keydown", function (e) {
  if (e.code === "Space" || e.code === "ArrowUp") {
    if (!started || gameOver) reset();
    else if (jumpOffset <= 0) velocity = 660;
  }
});

// ======== ЛОГИКА ========
function update(dt) {
  speed = Math.min(speed + 9 * dt, 620);
  walkPhase += dt * (9 + speed / 55);
  palmOffset -= speed * 0.4 * dt;
  if (palmOffset < -W) palmOffset += W;
  if (invincible > 0) invincible -= dt;

  // прыжок
  if (jumpOffset > 0 || velocity > 0) {
    velocity -= 1800 * dt;
    jumpOffset += velocity * dt;
    if (jumpOffset <= 0) { jumpOffset = 0; velocity = 0; }
  }

  // новые указатели школ
  spawnIn -= dt;
  if (spawnIn <= 0) {
    var school = Math.floor(Math.random() * SCHOOLS.length);
    ctx.font = "bold 13px sans-serif";
    var nameW = ctx.measureText(SCHOOLS[school][0]).width;
    var o = {
      school: school,
      h: 52 + Math.random() * 30,
      w: Math.max(62, nameW + 16),
      x: W + 100,
      passed: false
    };
    obstacles.push(o);
    spawnIn = 0.9 + Math.random() * 0.9 + 120 / speed;
  }

  // новые шарики
  balloonIn -= dt;
  if (balloonIn <= 0) {
    balloons.push({
      x: W + 40,
      y: 70 + Math.random() * (H * 0.25),
      r: 26,
      kpi: KPIS[Math.floor(Math.random() * KPIS.length)],
      color: BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)],
      bobPhase: Math.random() * 6.28,
      vx: 60 + Math.random() * 40
    });
    balloonIn = 3.5 + Math.random() * 3;
  }

  // движение шариков
  for (var i = balloons.length - 1; i >= 0; i--) {
    var b = balloons[i];
    b.x -= b.vx * dt;
    b.bobPhase += dt * 2;
    if (b.x < -80) balloons.splice(i, 1);
  }

  // подсказки-попапы
  for (var p = popups.length - 1; p >= 0; p--) {
    popups[p].y -= 40 * dt;
    popups[p].life -= dt;
    if (popups[p].life <= 0) popups.splice(p, 1);
  }

  // движение указателей, счёт, столкновения
  var g = groundY();
  var dLeft = dinoX() + 8;
  var dRight = dinoX() + dinoSize() - 12;
  var dBottom = g - jumpOffset - 4;

  for (var j = obstacles.length - 1; j >= 0; j--) {
    var ob = obstacles[j];
    ob.x -= speed * dt;
    if (ob.x + ob.w < 0) { obstacles.splice(j, 1); continue; }
    if (!ob.passed && ob.x + ob.w < dLeft) { ob.passed = true; score++; popups.push({ x: dinoX() + 40, y: g - 90, text: "+1 NPS", life: 1 }); }
    var oTop = g - ob.h;
    if (invincible <= 0 && dRight > ob.x && dLeft < ob.x + ob.w && dBottom > oTop) {
      lives--;
      invincible = 1.5;
      popups.push({ x: dinoX() + 40, y: g - 80, text: "-1 ❤️", life: 1 });
      if (lives <= 0) {
        gameOver = true;
        if (score > best) {
          best = score;
          try { localStorage.setItem("dinoBest", "" + best); } catch (e) {}
        }
        // счёт для Telegram (работает, когда игра открыта из Telegram)
        if (typeof TelegramGameProxy !== "undefined" && TelegramGameProxy.shareScore) {
          try { TelegramGameProxy.shareScore(); } catch (e) {}
        }
      }
    }
  }
}

// ======== ОТРИСОВКА ========
function draw() {
  var g = groundY();

  // небо
  ctx.fillStyle = "#8ED8F5";
  ctx.fillRect(0, 0, W, H);

  // солнце и облака
  ctx.fillStyle = "#FFD54F";
  ctx.beginPath(); ctx.arc(W - 60, 70, 28, 0, 6.29); ctx.fill();
  ctx.fillStyle = "#FFFFFF";
  roundRect(40, 50, 70, 18, 9); ctx.fill();
  roundRect(W * 0.45, 90, 60, 15, 8); ctx.fill();

  // трава
  ctx.fillStyle = "#7BC24D";
  ctx.fillRect(0, g, W, H - g);
  ctx.strokeStyle = "#5EA03A";
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(W, g); ctx.stroke();

  // пальмы (дальний план)
  ctx.font = "34px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("🌴", palmOffset + W * 0.3, g - 2);
  ctx.fillText("🌴", palmOffset + W * 0.85, g - 2);
  ctx.fillText("🌿", palmOffset + W * 0.6 + 20, g + 24);

  // шарики с KPI
  for (var i = 0; i < balloons.length; i++) {
    var b = balloons[i];
    var by = b.y + Math.sin(b.bobPhase) * 6;
    // ниточка
    ctx.strokeStyle = "#888";
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(b.x, by + b.r); ctx.lineTo(b.x, by + b.r + 18); ctx.stroke();
    // шар
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.ellipse(b.x, by, b.r * 0.85, b.r, 0, 0, 6.29); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.beginPath(); ctx.ellipse(b.x - 8, by - 8, 7, 10, -0.5, 0, 6.29); ctx.fill();
    // табличка с KPI
    ctx.font = "bold 12px sans-serif";
    var tw = ctx.measureText(b.kpi).width;
    ctx.fillStyle = "rgba(255,255,255,0.92)";
    roundRect(b.x - tw / 2 - 8, by + b.r + 18, tw + 16, 20, 8); ctx.fill();
    ctx.fillStyle = "#2E5D1F";
    ctx.textAlign = "center";
    ctx.fillText(b.kpi, b.x, by + b.r + 32);
    ctx.textAlign = "left";
  }

  // указатели школ
  for (var j = 0; j < obstacles.length; j++) {
    var o = obstacles[j];
    var top = g - o.h;
    var cx = o.x + o.w / 2;
    var postH = Math.min(14, o.h * 0.25);
    ctx.fillStyle = "#6B411F";
    ctx.fillRect(cx - 3, g - postH, 6, postH);
    ctx.fillStyle = "#8D5A34";
    roundRect(o.x, top, o.w, o.h - postH, 6); ctx.fill();
    ctx.strokeStyle = "#6B411F";
    ctx.lineWidth = 2.5;
    roundRect(o.x, top, o.w, o.h - postH, 6); ctx.stroke();
    ctx.fillStyle = "#FFF3D9";
    ctx.textAlign = "center";
    ctx.font = "15px sans-serif";
    ctx.fillText("🎓", cx, top + 19);
    ctx.font = "bold 13px sans-serif";
    ctx.fillText(SCHOOLS[o.school][0], cx, top + (o.h - postH) / 2 + 12);
    if (o.h > 68) {
      ctx.font = "8px sans-serif";
      ctx.fillText(SCHOOLS[o.school][1], cx, top + (o.h - postH) / 2 + 24);
    }
    ctx.textAlign = "left";
  }

  // герой бежит
  drawHero(g);

  // всплывающие +1/-1
  ctx.font = "bold 16px sans-serif";
  ctx.textAlign = "center";
  for (var p = 0; p < popups.length; p++) {
    ctx.globalAlpha = Math.max(popups[p].life, 0);
    ctx.fillStyle = "#2E5D1F";
    ctx.fillText(popups[p].text, popups[p].x, popups[p].y);
  }
  ctx.globalAlpha = 1;

  // жизни
  var heartsText = "";
  for (var h = 0; h < lives; h++) heartsText += "❤️";
  ctx.textAlign = "left";
  ctx.font = "18px sans-serif";
  ctx.fillText(heartsText, 12, 30);

  // счёт
  ctx.font = "bold 16px sans-serif";
  var scoreText = "NPS: " + score + "   Рекорд: " + best;
  var stw = ctx.measureText(scoreText).width;
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  roundRect(W - stw - 28, 10, stw + 20, 26, 9); ctx.fill();
  ctx.fillStyle = "#2E5D1F";
  ctx.fillText(scoreText, W - stw - 18, 28);

  // экраны
  ctx.textAlign = "center";
  ctx.fillStyle = "#2E5D1F";
  if (!started) {
    ctx.font = "bold 26px sans-serif";
    ctx.fillText("🦖 Dino Run", W / 2, H * 0.32);
    ctx.font = "bold 17px sans-serif";
    ctx.fillText("Нажми на экран, чтобы бежать!", W / 2, H * 0.32 + 34);
    ctx.font = "14px sans-serif";
    ctx.fillText("Прыгай через школы, лови шарики с KPI —", W / 2, H * 0.32 + 62);
    ctx.fillText("каждый пойманный шарик даёт +1 жизнь ❤️", W / 2, H * 0.32 + 82);
  } else if (gameOver) {
    ctx.font = "bold 26px sans-serif";
    ctx.fillText("Бум! Врезался в школу 😅", W / 2, H * 0.35);
  }
  ctx.textAlign = "left";
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ======== ЦИКЛ ========
function frame(t) {
  if (lastTime) {
    var dt = Math.min((t - lastTime) / 1000, 0.032);
    if (started && !gameOver) update(dt);
  }
  lastTime = t;
  heroClock = t * 0.001;
  draw();
  syncOverlay();
  requestAnimationFrame(frame);
}
// ======== ГЛОБАЛЬНЫЙ РЕЙТИНГ NPS ========
var LB_URL = "https://script.google.com/macros/s/AKfycbyQT6pl_K64SxZfYygX_VzunublAia8g4RP_atoKpiWz_lTRUt2tO9Bi5EY4g4LrbjdWg/exec";
var overlayShown = false, submitted = false, lastName = "";
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
  });
}
function renderBoard(list) {
  var ol = document.getElementById("board");
  ol.innerHTML = "";
  if (!list || !list.length) {
    ol.innerHTML = '<li class="empty">Пока никого — будь первым!</li>';
    return;
  }
  for (var i = 0; i < list.length; i++) {
    var e = list[i];
    var li = document.createElement("li");
    if (submitted && e.name === lastName) li.className = "me";
    li.innerHTML = '<span class="rk">' + (i + 1) + '.</span><span class="nm">' +
      escapeHtml(e.name) + '</span><b>' + (e.score | 0) + '</b>';
    ol.appendChild(li);
  }
}
function loadBoard() {
  var s = document.createElement("script");
  window.__npsCb = function (data) { renderBoard(data); if (s.parentNode) s.parentNode.removeChild(s); };
  s.onerror = function () { document.getElementById("board").innerHTML = '<li class="empty">Рейтинг недоступен</li>'; };
  s.src = LB_URL + "?action=top&callback=__npsCb&t=" + Date.now();
  document.body.appendChild(s);
}
function syncOverlay() {
  var over = document.getElementById("over");
  if (gameOver && !overlayShown) {
    overlayShown = true; submitted = false;
    document.getElementById("finalNps").textContent = score;
    var sb = document.getElementById("submitBtn");
    sb.disabled = false; sb.textContent = "В рейтинг";
    over.style.display = "flex";
    loadBoard();
  } else if (!gameOver && overlayShown) {
    overlayShown = false; over.style.display = "none";
  }
}
document.getElementById("submitBtn").addEventListener("click", function () {
  if (submitted) return;
  var nm = (document.getElementById("nameInput").value || "").trim().substring(0, 20) || "Аноним";
  lastName = nm; submitted = true;
  this.disabled = true; this.textContent = "Отправлено ✓";
  fetch(LB_URL, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: "name=" + encodeURIComponent(nm) + "&score=" + score
  }).then(function () { setTimeout(loadBoard, 1000); })
    .catch(function () { setTimeout(loadBoard, 1000); });
});
document.getElementById("againBtn").addEventListener("click", function () {
  reset();
  overlayShown = false;
  document.getElementById("over").style.display = "none";
});

requestAnimationFrame(frame);
</script>
